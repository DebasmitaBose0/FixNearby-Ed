name: Mark stale issues and PRs
on:
  schedule:
  - cron: '30 1 * * *'
jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/stale@v8
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: 'This issue has been inactive for 14 days. Please update or it will be closed in 7 days.'
        stale-pr-message: 'This PR has been inactive for 14 days. Please update or it will be closed in 7 days.'
        close-issue-message: 'This issue was closed due to prolonged inactivity.'
        close-pr-message: 'This PR was closed due to prolonged inactivity.'
        days-before-stale: 14
        days-before-close: 7
        stale-issue-label: 'stale'
        stale-pr-label: 'stale'
        exempt-issue-labels: 'in-progress,important,security,pinned'
        exempt-pr-labels: 'in-progress,important,security,draft'
