name: Code Quality Linter
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm install
    - name: Run ESLint
      run: npm run lint
